[core]
# Updated path for your project repository
dags_folder = /workspaces/Automated-Podcast-Downloader-Pipeline/dags

hostname_callable = airflow.utils.net.getfqdn
might_contain_dag_callable = airflow.utils.file.might_contain_dag_via_default_heuristic
default_timezone = utc
executor = LocalExecutor

# Using the modern Simple Auth Manager for Airflow 3.0+
auth_manager = airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
simple_auth_manager_users = admin:admin

# Set to True to bypass login screen in Codespaces (Guest Mode)
simple_auth_manager_all_admins = True

parallelism = 32
max_active_tasks_per_dag = 16
dags_are_paused_at_creation = True
max_active_runs_per_dag = 16
load_examples = False

# Updated path for plugins
plugins_folder = /workspaces/Automated-Podcast-Downloader-Pipeline/plugins

fernet_key = dkM20o1Vbhxq11tWQHLuXXhgj5PvpdP-pZtFtBsxvho=
dagbag_import_timeout = 30.0
dag_discovery_safe_mode = True

[database]
# Updated path for the SQLite database file
sql_alchemy_conn = sqlite:////workspaces/Automated-Podcast-Downloader-Pipeline/airflow.db

sql_engine_encoding = utf-8
sql_alchemy_pool_enabled = True
check_migrations = True

[logging]
# Updated path for logs
base_log_folder = /workspaces/Automated-Podcast-Downloader-Pipeline/logs
remote_logging = False
logging_level = INFO
fab_logging_level = WARNING
colored_console_log = True

# Updated directory for child process logs
dag_processor_child_process_log_directory = /workspaces/Automated-Podcast-Downloader-Pipeline/logs/dag_processor

log_formatter_class = airflow.utils.log.timezone_aware.TimezoneAware
log_timestamp_format = iso